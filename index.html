<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Saunatomy</title>

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Megrim&display=swap"
        rel="stylesheet">

    <style type="text/tailwindcss">
        @theme {
            --font-lato: "Lato", sans-serif;
            --color-base: #24273a;
            --color-blue: #8caaee;
            --color-red: #ed8796;
            --color-text: #cad3f5;
            --color-surface0: #363a4f;
            --color-peach: #f5a97f;
            --color-subtext0: #a5adcb;
        }
    </style>

</head>

<body class="bg-base text-text font-lato flex flex-col min-h-screen">
    <main class="w-full mx-auto flex-grow flex flex-col items-center pt-8 px-6">
        <h1 class="text-3xl text-red">Heiß auf Anatomie?</h1>
        <h2 class="text-sm mt-2">Aufgüsse zur vollen Stunde 🔥 </h2>

        <div class="mt-8 w-full max-w-4xl flex flex-col items-center">
            <p>Temperatur: <span id="temp-display" class="text-xl font-bold"></span> °C</p>
            <p class="text-xs text-subtext0">Gemessen am: <span id="date-display"></span></p>
            <p class="mt-2">Luftfeuchtigkeit: <span id="humidity-display"></span> %</p>

            <div class="mt-8 mb-8 w-full p-2 bg-surface0 rounded-lg shadow-lg">
                <div class="mb-2 relative h-64 sm:h-80 w-full">
                    <canvas id="weekly-chart"></canvas>
                </div>

                <div class="flex justify-between items-start py-1">

                    <div class="flex flex-col">
                        <label class="label text-xs text-text mb-2">
                            <input type="checkbox" id="point-toggle"
                                class="toggle border-text bg-surface0 text-text checked:text-red" />
                            Datenpunkte anzeigen
                        </label>
                        <label class="label text-xs text-text">
                            <input type="checkbox" id="max-toggle"
                                class="toggle border-text bg-surface0 text-text checked:text-peach" />
                            Maximum einblenden
                        </label>
                    </div>

                    <select id="timeframe-select" class="text-text text-xs px-2 rounded-xl cursor-pointer p-1">
                        <option value="live" disabled>live</option>
                        <option value="sensor_daily_data" selected>24h</option>
                        <option value="sensor_3days_data">3 Tage</option>
                        <option value="sensor_weekly_data">1 Woche</option>
                    </select>
                </div>

            </div>

            <p>Maximale Temperatur: <span id="max-temp-display" class="font-fold text-peach"></span> °C</p>
            <p class="text-xs text-subtext0">Gemessen am: <span id="max-date-display"></span></p>
        </div>

    </main>

    <script>
        const supabaseUrl = 'https://yzkynjxzipoyjwrhpjmv.supabase.co';
        const supabaseKey = 'sb_publishable_kgKbsxtWXuSzCX-j0GPnJQ_s8Z9X54t';
        const supabaseClient = window.supabase.createClient(supabaseUrl, supabaseKey);

        const tempDisplay = document.getElementById('temp-display');
        const humidityDisplay = document.getElementById('humidity-display');
        const maxTempDisplay = document.getElementById('max-temp-display');
        const chartCanvas = document.getElementById('weekly-chart');
        const dateDisplay = document.getElementById('date-display');
        const maxDateDisplay = document.getElementById('max-date-display');
        const pointToggle = document.getElementById('point-toggle');
        const maxToggle = document.getElementById('max-toggle');
        const timeframeSelect = document.getElementById('timeframe-select')

        let maxTemp = null;
        let maxTempDate = null;
        let chart = null;

        async function loadInitialData() {
            const { data, error } = await supabaseClient
                .from('sensor_data')
                .select('temperature, humidity, created_at')
                .order('created_at', { ascending: false })
                .limit(1)
                .single();

            if (error) {
                console.error('Error fetching initial data:', error);
                return;
            }

            if (data) {
                tempDisplay.textContent = data.temperature.toFixed(1);
                humidityDisplay.textContent = data.humidity.toFixed(1);
                dateDisplay.textContent = new Date(data.created_at).toLocaleString('de-DE', {
                    weekday: 'long',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
            }
        }

        async function loadExtremes() {
            const { data, error } = await supabaseClient
                .from('sensor_extremes')
                .select('max_temperature, max_temperature_at')
                .single();

            if (error) {
                console.error('Error fetching extremes:', error);
                return;
            }

            if (data) {
                maxTemp = data.max_temperature.toFixed(1);
                maxTempDate = new Date(data.max_temperature_at).toLocaleString('de-DE', {
                    weekday: 'long',
                    day: '2-digit',
                    month: '2-digit',
                    year: 'numeric',
                    hour: '2-digit',
                    minute: '2-digit'
                });
                maxTempDisplay.textContent = maxTemp;
                maxDateDisplay.textContent = maxTempDate;
            }
        }

        async function loadGraphData(viewName = 'sensor_daily_data') {
            const { data, error } = await supabaseClient
                .from(viewName)
                .select('*')
                .order('time_bucket', { ascending: true });

            if (error) {
                console.error('Error fetching graph data;', error);
                return;
            }

            if (data) {
                const labels = data.map(row => {
                    const date = new Date(row.time_bucket);
                    return date.toLocaleString('de-DE', {
                        weekday: 'short',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                });

                const tempData = data.map(row => row.avg_temperature);
                const humidityData = data.map(row => row.avg_humidity);

                if (chart) {
                    chart.destroy();
                }

                renderChart(labels, tempData, humidityData)
            }
        }

        pointToggle.addEventListener('change', (e) => {
            if (!chart) return;

            const showPoints = e.target.checked;
            chart.data.datasets[0].pointRadius = showPoints ? 2 : 0;

            chart.update();
        });

        maxToggle.addEventListener('change', (e) => {
            if (!chart) return;

            const showMax = e.target.checked;
            chart.options.plugins.annotation.annotations.maxTempLine.borderWidth = showMax ? 0.4 : 0;

            chart.update();
        });

        timeframeSelect.addEventListener('change', (e) => {
            const selectedView = e.target.value;

            pointToggle.checked = false;
            maxToggle.checked = false;
            
            loadGraphData(selectedView)
        });

        function renderChart(labels, tempData, humidityData) {
            chart = new Chart(chartCanvas, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Temperatur (°C)',
                            data: tempData,
                            borderColor: '#ed8796',
                            pointBackgroundColor: '#ed8796',
                            pointStyle: 'circle',
                            pointRadius: 0,
                            pointHoverRadius: 3,
                            borderWidth: 1,
                            tension: 0.4,
                            yAxisID: 'y',
                        },
                        {
                            label: 'Luftfeuchtigkeit (%)',
                            data: humidityData,
                            borderColor: '#8caaee',
                            pointStyle: false,
                            borderWidth: 1,
                            tension: 0.4,
                            borderDash: [1, 8],
                            yAxisID: 'y1'
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        x: {
                            ticks: { maxTicksLimit: 14 }
                        },
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: { display: true, text: 'Temperatur (°C)' }
                        },
                        y1: {
                            type: 'linear',
                            display: false,
                            position: 'right',
                            title: { display: true, text: 'Luftfeuchtigkeit (%)' },
                            grid: { drawOnChartArea: false }
                        }
                    },
                    plugins: {
                        annotation: {
                            annotations: {
                                maxTempLine: {
                                    type: 'line',
                                    value: maxTemp,
                                    scaleID: 'y',
                                    borderColor: '#f5a97f',
                                    borderWidth: 0,
                                }
                            }
                        }
                    }
                }
            })
        }

        supabaseClient
            .channel('sensor_data_stream')
            .on('postgres_changes', {
                event: 'INSERT',
                schema: 'public',
                table: 'sensor_data',
            }, payload => {
                if (payload.new.temperature !== null) {
                    const newTemp = Number(payload.new.temperature.toFixed(1));
                    const newDate = new Date(payload.new.created_at).toLocaleString('de-DE', {
                        weekday: 'long',
                        day: '2-digit',
                        month: '2-digit',
                        year: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });
                    tempDisplay.textContent = newTemp;
                    dateDisplay.textContent = newDate;

                    if (newTemp > maxTemp) {
                        maxTemp = newTemp;
                        maxTempDisplay.textContent = maxTemp;
                        maxDateDisplay.textContent = newDate;
                        
                        chart.update();
                    }
                }
                if (payload.new.humidity !== null) {
                    humidityDisplay.textContent = Number(payload.new.humidity.toFixed(1));
                }
            })
            .subscribe();

        loadInitialData();
        loadExtremes();
        loadGraphData();

    </script>

</body>

</html>
